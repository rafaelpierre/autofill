<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Autofill Settings</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }
    label { display: block; margin-top: 14px; font-weight: 600; }
    input { width: 100%; box-sizing: border-box; padding: 8px; margin-top: 4px; }
    button { margin-top: 16px; padding: 10px 18px; cursor: pointer; }
    #status { color: green; margin-left: 10px; }
    .site { border: 1px solid #ccc; border-radius: 8px; padding: 12px 16px; margin-top: 16px; }
    .site .row { display: flex; gap: 10px; }
    .site .row > div { flex: 1; }
    .hint { font-weight: 400; font-size: 12px; color: #666; }
    .remove { background: #fee; border: 1px solid #d99; }
  </style>
</head>
<body>
  <h2>Autofill Settings</h2>

  <label>Username / Email
    <input id="username" type="text" autocomplete="off">
  </label>

  <label>Password
    <input id="password" type="password" autocomplete="off">
  </label>

  <h3>Sites</h3>
  <p class="hint">URL is matched as a substring of the page address. XPath fields are
  optional — leave blank to use automatic field detection.</p>

  <div id="sites"></div>
  <button id="addSite">+ Add site</button>

  <div>
    <button id="save">Save</button>
    <span id="status"></span>
  </div>

  <template id="siteTemplate">
    <div class="site">
      <label>URL (substring match)
        <input class="url" type="text" placeholder="https://example.com/login">
      </label>
      <div class="row">
        <div>
          <label>User field XPath <span class="hint">(optional)</span>
            <input class="xpUser" type="text" placeholder="//input[@id='username']">
          </label>
        </div>
        <div>
          <label>Password field XPath <span class="hint">(optional)</span>
            <input class="xpPass" type="text" placeholder="//input[@type='password']">
          </label>
        </div>
      </div>
      <label>Submit button XPath <span class="hint">(optional)</span>
        <input class="xpSubmit" type="text" placeholder="//button[@type='submit']">
      </label>
      <button class="remove">Remove this site</button>
    </div>
  </template>

  <script src="options.js"></script>
</body>
</html>
